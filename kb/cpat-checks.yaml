    short_title: Default tablespace is not DATA
    rule: "Default tablespace is not DATA"
    impact: "Modified to DATA in ADB"
    action: "Ensure proper quota set post-migration"

  - id: has_absent_tablespaces
    category: tablespaces
    short_title: Referenced tablespaces don't exist
    rule: "Referenced tablespaces don't exist"
    impact: "ORA-00959 errors"
    action: "Pre-create or remap tablespaces"

  # ---------------------------------------------------------------------------
  # logging_and_compression
  # ---------------------------------------------------------------------------
  - id: has_logging_off_for_tables
    category: logging_and_compression
    short_title: NOLOGGING tables
    rule: "NOLOGGING tables become LOGGING"
    impact: "Automatic conversion"
    action: "No action required"

  - id: has_logging_off_for_partitions
    category: logging_and_compression
    short_title: NOLOGGING partitions
    rule: "NOLOGGING partitions become LOGGING"
    impact: "Automatic conversion"
    action: "No action required"

  - id: has_logging_off_for_subpartitions
    category: logging_and_compression
    short_title: NOLOGGING subpartitions
    rule: "NOLOGGING subpartitions become LOGGING"
